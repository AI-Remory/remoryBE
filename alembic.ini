# Alembic Configuration

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
# file_template = %%(rev)s_%%(timestamp)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# none, then sys.path hasn't changed

# migration_path in the down() function.
# run the environment from the command line, the current working directory is
# added to the sys.path.
# See also the -A/--autogenerate argument and SQLALCHEMY_DATABASE_URL setting.

sqlalchemy.url = driver://user:password@localhost/dbname


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
